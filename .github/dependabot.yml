version: 2
updates:
  # Keep the SHA-pinned actions in ci.yml current via reviewable PRs.
  # Group all action bumps into one weekly PR instead of one per action.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  # npm dependencies. Group minor/patch into one weekly PR; majors stay separate.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
